# Release. Two ways in, same pipeline: push a `vX.Y.Z` tag, OR run this workflow from
# the Actions UI and pick a bump (patch/minor) — the `version` job then derives the next
# version from the latest tag and creates it. Major bumps: tag by hand. Either way the
# git tag is the single source of version truth (stamped into pyproject.toml +
# npm/package.json at build time). Publishing is gated on the full test matrix.
#
# One-time setup required (outside this repo) — both are token-less OIDC Trusted Publishing:
#   - PyPI: configure a Trusted Publisher for project `mudraka` → this repo, workflow
#     `release.yml`, environment `pypi`.
#   - npm: publish `mudraka` once manually to create the package (see docs/BUILD.md), then
#     add a Trusted Publisher in the package settings → GitHub Actions, this repo,
#     workflow `release.yml`, environment `npm`. No NPM_TOKEN needed.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (from the latest tag). Major: tag by hand."
        type: choice
        options: [patch, minor]
        default: patch

jobs:
  # Resolve the release version and the commit to build/tag. On a tag push the version
  # comes from the ref. On manual dispatch we bump the latest tag, stamp the version into
  # pyproject.toml + npm/package.json, commit that back to the branch, and tag it — so the
  # repo always reflects the released version (the tag stays the single source of truth).
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # push the version-bump commit + tag on manual dispatch
    outputs:
      version: ${{ steps.v.outputs.version }}
      sha: ${{ steps.v.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need existing tags to compute the next one
      - id: v
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
            latest=${latest:-v0.0.0}
            IFS=. read -r MA MI PA <<< "${latest#v}"
            case "${{ inputs.bump }}" in
              minor) MI=$((MI + 1)); PA=0 ;;
              patch) PA=$((PA + 1)) ;;
            esac
            ver="$MA.$MI.$PA"
            python3 tools/stamp_version.py "$ver"   # bump pyproject.toml + npm/package.json
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "chore(release): v$ver"
            git tag "v$ver"
            git push origin "HEAD:${GITHUB_REF_NAME}" "v$ver"  # commit back to the branch + tag it
            sha=$(git rev-parse HEAD)
          else
            ver="${GITHUB_REF_NAME#v}"
            sha="$GITHUB_SHA"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Release $ver @ $sha"

  test:
    uses: ./.github/workflows/ci.yml

  wheels:
    needs: [version, test]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.sha }}  # the version-bump commit (dispatch) or the tagged commit
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Stamp version
        shell: bash
        run: python tools/stamp_version.py "${{ needs.version.outputs.version }}"
      - name: Build wheels
        shell: bash
        run: pipx run cibuildwheel --output-dir dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/*.whl

  sdist:
    needs: [version, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Stamp version
        run: python tools/stamp_version.py "${{ needs.version.outputs.version }}"
      - name: Build sdist
        run: pipx run build --sdist --outdir dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  publish-pypi:
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-npm:
    needs: [version, test]
    runs-on: ubuntu-latest
    environment: npm  # must match the npm Trusted Publisher's configured environment
    permissions:
      id-token: write  # npm Trusted Publishing (OIDC) + automatic provenance
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm (Trusted Publishing needs >= 11.5.1)
        run: npm install -g npm@latest
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.1  # pinned — docs/BUILD.md
      - name: Build WASM
        run: |
          emcmake cmake -S . -B build-wasm -DMUDRAKA_BUILD_WASM=ON -DMUDRAKA_BUILD_TESTS=OFF
          cmake --build build-wasm
      - name: Assemble package
        run: |
          cp build-wasm/bindings/wasm/mudraka.js build-wasm/bindings/wasm/mudraka.wasm npm/
          cd npm && npm version "${{ needs.version.outputs.version }}" --no-git-tag-version --allow-same-version
      - name: Publish (OIDC, provenance auto)
        run: cd npm && npm publish --access public
